version: 9
kind: transport_projection
source_of_truth: engine/command-catalog.yaml
generated_from: engine/command-catalog.yaml
purpose: API transport and offline delivery hints only; business rules remain in the Engine catalog.
transport:
  endpoint: /functions/v1/command-gateway
  method: POST
  authentication: supabase_bearer_session
  request_schema: ../../schemas/command.schema.json
  success_data_schema: ../../supabase/contracts/private-process-command-result.schema.json
  response_envelope:
    success: [request_id, data]
    error: [request_id, error]
  idempotency: command_id
  idempotency_header: none
  rule: command.idempotency_key_must_equal_command_id
expedition_bootstrap:
  command_type: create_expedition
  endpoint: /functions/v1/command-gateway
  active_membership_required: false
  active_profile_required: true
  incoming_actor_id: authenticated_profile_id
  authoritative_actor_id: generated_captain_membership_id
  authoritative_actor_role: captain
  runtime_release_source: ILKA_DEFAULT_RUNTIME_RELEASE_KEY
  private_transaction: private.bootstrap_expedition
  private_request_schema: ../../supabase/contracts/private-bootstrap-expedition-request.schema.json
  event: expedition.created
  initial_expedition_status: draft
  initial_stream_position: 1
  initial_projection_version: 0
  offline_allowed: false
  client_creates_local_aggregate: false
  creates:
  - expedition
  - captain_membership
  - stream_head
  - projection_head
  - command_receipt
  - expedition_created_event
  excludes:
  - participant
  - invitation
  - rotation
  - day
  - stage
  - assignment
  - card_bundle
  - projection_document
  public_errors:
  - authentication_required
  - active_profile_required
  - profile_actor_mismatch
  - validation_failed
  - invalid_timezone
  - runtime_release_unavailable
  - expedition_key_already_exists
  - idempotency_key_reused_with_different_payload
  - bootstrap_persistence_unavailable
offline_delivery:
  queueable_commands:
  - acknowledge_card
  - start_task
  - block_task
  - complete_task
  - confirm_output
  - request_day_close
  - request_stage_advance
  - create_decision_draft
  - create_vote
  - vote
  statuses:
  - pending
  - synced
  - conflict
  - rejected
  retry_policy: exact_stored_command_by_command_id
  ordering: fifo_sequential
  single_flight: true
  triggers:
  - participant_app_start_online
  - command_enqueued_online
  - browser_online
  - explicit_retry_pending
  outcome_mapping:
    accepted_or_replayed:
      queue_status: synced
      refetch: api.get_today_view
    persisted_rejection:
      queue_status: rejected
      refetch: api.get_today_view
    stream_conflict:
      queue_status: conflict
      refetch: api.get_today_view
      stop_fifo_cycle: true
    retryable_transport_error:
      queue_status: pending
      increment_attempts: true
      stop_fifo_cycle: true
    authentication_unavailable:
      queue_status: pending
      stop_fifo_cycle: true
  authoritative_reconciliation:
    projection: TodayView
    rule: receipt_never_mutates_domain_fields_client_side
server_only_commands:
- process_day_boundary
- publish_rating_snapshot
server_confirmation_required:
- create_expedition
- advance_stage
- override_stage_advance
- close_day
- override_day_close
- override_role_assignment
- activate_recovery_day
- suspend_program
- resume_program
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- finalize_product_decision
- override_product_decision
- verify_role_assignment
- adjust_role_xp
- close_expedition
dangerous_super_admin_commands:
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- close_expedition
offline_draft_only_commands:
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- close_expedition
product_decision_commands:
- create_decision_draft
- create_vote
- vote
- finalize_product_decision
- override_product_decision
gamification_commands:
- verify_role_assignment
- adjust_role_xp
- publish_rating_snapshot
expedition_completion_commands:
- close_expedition
