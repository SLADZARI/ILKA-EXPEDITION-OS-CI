version: 11
kind: transport_projection
source_of_truth: engine/command-catalog.yaml
generated_from: engine/command-catalog.yaml
purpose: API transport and offline delivery hints only; business rules remain in the Engine catalog.
transport:
  endpoint: /functions/v1/command-gateway
  method: POST
  authentication: supabase_bearer_session
  request_schema: ../../schemas/command.schema.json
  success_data_schema: ../../supabase/contracts/private-process-command-result.schema.json
  response_envelope:
    success: [request_id, data]
    error: [request_id, error]
  idempotency: command_id
  idempotency_header: none
  rule: command.idempotency_key_must_equal_command_id
expedition_bootstrap:
  command_type: create_expedition
  endpoint: /functions/v1/command-gateway
  active_membership_required: false
  active_profile_required: true
  incoming_actor_id: authenticated_profile_id
  authoritative_actor_id: generated_captain_membership_id
  authoritative_actor_role: captain
  runtime_release_source: ILKA_DEFAULT_RUNTIME_RELEASE_KEY
  private_transaction: private.bootstrap_expedition
  private_request_schema: ../../supabase/contracts/private-bootstrap-expedition-request.schema.json
  event: expedition.created
  initial_expedition_status: draft
  initial_stream_position: 1
  initial_projection_version: 0
  offline_allowed: false
  client_creates_local_aggregate: false
  creates:
  - expedition
  - captain_membership
  - stream_head
  - projection_head
  - command_receipt
  - expedition_created_event
  excludes:
  - participant
  - invitation
  - rotation
  - day
  - stage
  - assignment
  - card_bundle
  - projection_document
  public_errors:
  - authentication_required
  - active_profile_required
  - profile_actor_mismatch
  - validation_failed
  - invalid_timezone
  - runtime_release_unavailable
  - expedition_key_already_exists
  - idempotency_key_reused_with_different_payload
  - bootstrap_persistence_unavailable
expedition_setup:
  source_of_truth: docs/decisions/ADR-018-expedition-setup-and-day1-pilot-runtime.md
  endpoint: /functions/v1/command-gateway
  legacy_non_public_commands: [add_participant]
  commands:
    invite_participant:
      actor: active_captain_membership
      payload: [email, invitation_token]
      pre_membership: false
      offline_allowed: false
      event: invitation.created
    accept_invitation:
      actor: authenticated_active_profile_matching_invitation_email
      payload: [invitation_token, display_name]
      pre_membership: true
      offline_allowed: false
      events: [invitation.accepted, participant.added]
    revoke_invitation:
      actor: active_captain_membership
      payload: [invitation_id, reason]
      pre_membership: false
      offline_allowed: false
      event: invitation.revoked
  secret_handling:
    token_format: 32_byte_unpadded_base64url
    persisted_value: sha256_only
    forbidden_outputs: [event, projection, receipt, structured_log, public_error]
    event_identity: masked_email_hint_only
  authoritative_refetch: api.get_expedition_setup_view
  implementation_status: executable_gate_9b2c_and_9c
expedition_day1_start:
  source_of_truth: docs/decisions/ADR-021-start-expedition-and-day1-boundary.md
  implementation_status: executable_gate_9d3
  start_expedition:
    endpoint: /functions/v1/command-gateway
    authentication: supabase_bearer_session
    actor: active_captain_membership
    payload: []
    expedition_from: ready
    expedition_to: active
    events: [expedition.started, stage.opened]
    creates_calendar_day: false
    offline_allowed: false
    authoritative_refetch: api.get_expedition_setup_view
    private_transaction: private.start_expedition
  process_day_boundary:
    endpoint: /functions/v1/command-gateway
    authentication: trusted_system_clock_hmac
    actor: system_clock
    browser_api_allowed: false
    payload: [local_calendar_date, boundary_at]
    command_id_template: cmd_day_boundary_<expedition_id>_<local_calendar_date_compact>
    idempotency_key: command_id
    day1_events: [day.started, role_assignments.activated, card_bundles.published]
    conditional_previous_day_events: [role_assignments.expired, task.overdue]
    private_transaction: private.process_day_boundary
    projection_publication: [today_view_per_active_participant, captain_day_view]
    offline_allowed: false
  system_clock_headers:
    timestamp: x-ilka-system-timestamp
    signature: x-ilka-system-signature
    algorithm: hmac_sha256
    signed_value: timestamp_dot_raw_request_body
    constant_time_compare_required: true
    server_secret_only: true
  participant_task_blocker_key: <participant_key>:<task_id>
offline_delivery:
  queueable_commands:
  - acknowledge_card
  - start_task
  - block_task
  - complete_task
  - confirm_output
  - request_day_close
  - request_stage_advance
  - create_decision_draft
  - create_vote
  - vote
  statuses:
  - pending
  - synced
  - conflict
  - rejected
  retry_policy: exact_stored_command_by_command_id
  ordering: fifo_sequential
  single_flight: true
  triggers:
  - participant_app_start_online
  - command_enqueued_online
  - browser_online
  - explicit_retry_pending
  outcome_mapping:
    accepted_or_replayed:
      queue_status: synced
      refetch: api.get_today_view
    persisted_rejection:
      queue_status: rejected
      refetch: api.get_today_view
    stream_conflict:
      queue_status: conflict
      refetch: api.get_today_view
      stop_fifo_cycle: true
    retryable_transport_error:
      queue_status: pending
      increment_attempts: true
      stop_fifo_cycle: true
    authentication_unavailable:
      queue_status: pending
      stop_fifo_cycle: true
  authoritative_reconciliation:
    projection: TodayView
    rule: receipt_never_mutates_domain_fields_client_side
server_only_commands:
- process_day_boundary
- publish_rating_snapshot
server_confirmation_required:
- create_expedition
- invite_participant
- accept_invitation
- revoke_invitation
- generate_rotation
- start_expedition
- advance_stage
- override_stage_advance
- close_day
- override_day_close
- override_role_assignment
- activate_recovery_day
- suspend_program
- resume_program
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- finalize_product_decision
- override_product_decision
- verify_role_assignment
- adjust_role_xp
- close_expedition
dangerous_super_admin_commands:
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- close_expedition
offline_draft_only_commands:
- force_day_transition
- rewind_day
- ban_participant
- unban_participant
- close_expedition
product_decision_commands:
- create_decision_draft
- create_vote
- vote
- finalize_product_decision
- override_product_decision
gamification_commands:
- verify_role_assignment
- adjust_role_xp
- publish_rating_snapshot
expedition_completion_commands:
- close_expedition
