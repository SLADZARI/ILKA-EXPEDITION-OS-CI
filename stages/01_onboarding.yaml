version: 3
stage_id: onboarding
order: 1
title: Onboarding and Team Contract
objective: Сформировать команду, правила взаимодействия и безопасный рабочий контур.
required_inputs: []
required_outputs:
- id: team_agreement
  type: document
  required: true
- id: safety_acknowledgements
  type: acknowledgement_set
  required: true
- id: participant_profiles
  type: record_set
  required: true
allowed_product_roles:
- product_captain
- product_support
required_product_roles:
- role_id: product_captain
  count: 1
- role_id: product_support
  count: remaining
card_refs:
  shared:
  - knowledge_expedition_rules
  - knowledge_day_01_flow
  - safety_captain_authority
  - task_team_agreement
  by_product_role:
    product_captain:
    - role_product_captain_day_01
    product_support:
    - role_product_support_day_01
  by_onboard_role:
    navigation:
    - onboard_navigation_day_01
    mooring:
    - onboard_mooring_day_01
    order:
    - onboard_order_day_01
    cook:
    - onboard_cook_day_01
    product_focus:
    - onboard_product_focus_day_01
assignment_rules:
  team_size:
    minimum: 3
    maximum: 5
  exactly_one_product_role_per_participant: true
  exactly_one_onboard_role_per_participant: true
  cook_product_load_limit: low
  assignment_bundle_requires_all_shared_cards: true
automations:
  on_stage_opened:
  - prepare_stage_content
  on_day_started:
  - publish_daily_assignment_bundles
definition_of_done:
  all:
  - output_confirmed: team_agreement
  - output_confirmed: safety_acknowledgements
  - output_confirmed: participant_profiles
  - all_required_tasks_completed_or_waived: true
  - all_required_acknowledgements_completed: true
  - role_handover_prepared: true
  captain_override:
    allowed: true
    requires_reason: true
    emits: stage.advance_overridden
captain_controls:
- advance_stage
- override_stage_advance
- close_day
- override_day_close
- suspend_program
- override_role_assignment
- recover_day_transition
- activate_recovery_day
offline:
  required_content_cached: true
  completion_events_queueable: true
  acknowledgements_queueable: true
  evidence_queueable: true
  local_boundary_projection: expired_pending_sync
  sync_order:
  - commands
  - evidence
  - acknowledgements
