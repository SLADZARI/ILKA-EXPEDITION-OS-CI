name: Gate 9B2C finalize sources

on:
  push:
    branches:
      - feat/gate-9b2c-invitation-execution

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2c-invitation-execution
          token: ${{ github.token }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Apply one-shot synchronization
        run: python scripts/patch_gate9b2c_gateway.py

      - name: Format TypeScript sources
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime

      - name: Validate Python syntax
        run: python -m py_compile scripts/validate_expedition_invitation_execution.py

      - name: Commit finalized sources
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md docs/decisions/ADR-019-invitation-transaction-boundaries.md docs/architecture/expedition-invitation-execution.md scripts/validate_expedition_invitation_execution.py supabase/functions
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(gate9b2c): finalize invitation execution sources"
          git push origin HEAD:feat/gate-9b2c-invitation-execution
