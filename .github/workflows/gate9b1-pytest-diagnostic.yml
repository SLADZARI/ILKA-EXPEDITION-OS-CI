name: Gate 9B1 pytest diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest-diagnostic:
    if: github.head_ref == 'feat/gate-9b1-canonical-setup-contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run pytest and capture output
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee gate9b1-pytest.log
      - name: Upload pytest output
        uses: actions/upload-artifact@v4
        with:
          name: gate9b1-pytest-output
          path: gate9b1-pytest.log
      - name: Preserve failing status
        if: steps.pytest.outcome == 'failure'
        run: exit 1
