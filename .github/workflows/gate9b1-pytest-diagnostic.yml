name: Gate 9B1 test compatibility builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.head_ref == 'feat/gate-9b1-canonical-setup-contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Apply Gate 9B1 test compatibility patch
        run: python scripts/apply_gate9b1_test_compat.py
      - name: Run complete pytest suite
        run: pytest -q
      - name: Remove one-shot compatibility builder
        run: git rm scripts/apply_gate9b1_test_compat.py .github/workflows/gate9b1-pytest-diagnostic.yml
      - name: Commit final compatibility update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(gate9b1): align compatibility assertions with setup contracts"
          git push origin HEAD:${{ github.head_ref }}
