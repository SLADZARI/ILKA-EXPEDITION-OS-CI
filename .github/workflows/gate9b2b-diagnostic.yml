name: Gate 9B2B pgTAP diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  invitation-pgtap:
    if: github.head_ref == 'feat/gate-9b2b-invitation-persistence'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2b-invitation-persistence
          token: ${{ github.token }}

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Run invitation pgTAP and persist failure tail
        shell: bash
        run: |
          supabase start >/tmp/supabase-start.log 2>&1
          if ! supabase test db supabase/tests/invitation_transactions.test.sql >/tmp/gate9b2b-pgtap.log 2>&1; then
            tail -n 120 /tmp/gate9b2b-pgtap.log > gate9b2b-pgtap-error.txt
            cat gate9b2b-pgtap-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gate9b2b-pgtap-error.txt
            if ! git diff --cached --quiet; then
              git commit -m "chore(gate9b2b): capture pgTAP diagnostic"
              git push origin HEAD:feat/gate-9b2b-invitation-persistence
            fi
            exit 1
          fi
          rm -f gate9b2b-pgtap-error.txt

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true
