name: Gate 8B database diagnostic

on:
  pull_request:
    paths:
      - ".github/workflows/gate8b-db-diagnostic.yml"
      - "supabase/migrations/20260721103000_expedition_bootstrap_transaction.sql"
      - "supabase/tests/expedition_bootstrap_transaction.test.sql"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Gate 8B branch
        uses: actions/checkout@v4
        with:
          ref: feat/expedition-bootstrap-transaction

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase with compact debug tail
        shell: bash
        run: |
          set +e
          supabase start --debug > /tmp/supabase-start.log 2>&1
          status=$?
          tail -n 180 /tmp/supabase-start.log
          exit "$status"

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
