name: Apply Gate 9D2B routing

on:
  push:
    branches:
      - agent/gate9d2b-route-start-expedition

permissions:
  contents: write

jobs:
  apply-routing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gate 9D2B branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d2b-route-start-expedition
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic routing patch
        run: python scripts/apply_gate9d2b_routing.py

      - name: Commit routing composition
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(gate9d2b): route Expedition start through command gateway"
          git push origin HEAD:agent/gate9d2b-route-start-expedition
