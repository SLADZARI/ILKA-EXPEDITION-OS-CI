name: Deploy command gateway to development

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-command-gateway-development
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    steps:
      - name: Checkout reviewed main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify deployment credential
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured for the development environment."
            exit 1
          fi

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Deploy authenticated command gateway
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy command-gateway \
            --project-ref rehfxjlyfojkpascjtmb \
            --use-api

      - name: Verify deployed function registration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions list \
            --project-ref rehfxjlyfojkpascjtmb | tee /tmp/functions.txt
          grep -q "command-gateway" /tmp/functions.txt
