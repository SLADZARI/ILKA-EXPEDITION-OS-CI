name: Deploy command gateway to development

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-command-gateway-development
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    steps:
      - name: Checkout reviewed main source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify deployment credentials and configuration
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ILKA_SYSTEM_CLOCK_HMAC_SECRET: ${{ secrets.ILKA_SYSTEM_CLOCK_HMAC_SECRET }}
          ILKA_ALLOWED_ORIGINS: ${{ secrets.ILKA_ALLOWED_ORIGINS }}
        run: |
          for name in SUPABASE_ACCESS_TOKEN ILKA_SYSTEM_CLOCK_HMAC_SECRET ILKA_ALLOWED_ORIGINS; do
            if [[ -z "${!name}" ]]; then
              echo "$name is not configured for the development environment."
              exit 1
            fi
          done
          grep -A2 '^\[functions.command-gateway\]' supabase/config.toml | grep -q 'verify_jwt = true'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Verify existing database secret
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets list \
            --project-ref rehfxjlyfojkpascjtmb | tee /tmp/secrets.txt
          grep -q 'SUPABASE_DB_URL' /tmp/secrets.txt

      - name: Configure Day 1 pilot runtime environment
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ILKA_SYSTEM_CLOCK_HMAC_SECRET: ${{ secrets.ILKA_SYSTEM_CLOCK_HMAC_SECRET }}
          ILKA_ALLOWED_ORIGINS: ${{ secrets.ILKA_ALLOWED_ORIGINS }}
        run: |
          supabase secrets set \
            ILKA_DEFAULT_RUNTIME_RELEASE_KEY=day1_pilot_v1 \
            ILKA_SYSTEM_CLOCK_HMAC_SECRET="$ILKA_SYSTEM_CLOCK_HMAC_SECRET" \
            ILKA_ALLOWED_ORIGINS="$ILKA_ALLOWED_ORIGINS" \
            --project-ref rehfxjlyfojkpascjtmb

      - name: Deploy authenticated command gateway
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy command-gateway \
            --project-ref rehfxjlyfojkpascjtmb \
            --use-api

      - name: Verify deployed function registration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions list \
            --project-ref rehfxjlyfojkpascjtmb | tee /tmp/functions.txt
          grep -q "command-gateway" /tmp/functions.txt
