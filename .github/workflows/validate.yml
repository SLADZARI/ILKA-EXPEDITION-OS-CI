name: Regenerate Gate 9D3 database types

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate-database-types:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Gate 9D3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d3-day1-boundary
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start and rebuild local Supabase
        run: |
          supabase start
          supabase db reset

      - name: Generate canonical database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Commit generated types
        shell: bash
        run: |
          if git diff --quiet -- supabase/database.types.ts; then
            echo "Canonical database types are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/database.types.ts
          git commit -m "chore(gate9d3): refresh generated database types"
          git push origin HEAD:agent/gate9d3-day1-boundary

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
