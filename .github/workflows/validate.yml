name: Apply Gate 9D3 SQL precedence fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-sql-precedence-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gate 9D3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d3-day1-boundary
          fetch-depth: 0

      - name: Parenthesize JSON text extraction in deterministic identifiers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("supabase/migrations/20260723010000_process_day_boundary_transaction.sql")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "'assignment_day_01_' || supplied.assignment ->> 'participant_id' || '_' || supplied.assignment ->> 'role_type'":
                  "'assignment_day_01_' || (supplied.assignment ->> 'participant_id') || '_' || (supplied.assignment ->> 'role_type')",
              "'bundle_day_01_' || supplied.bundle ->> 'participant_id'":
                  "'bundle_day_01_' || (supplied.bundle ->> 'participant_id')",
              "'today_view:' || supplied.mutation ->> 'subject_id'":
                  "'today_view:' || (supplied.mutation ->> 'subject_id')",
          }
          changed = False
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)
                  changed = True
              elif new not in text:
                  raise SystemExit(f"Gate 9D3 SQL marker drifted: {old}")
          if changed:
              path.write_text(text, encoding="utf-8")
          PY

      - name: Commit SQL precedence fix
        shell: bash
        run: |
          if git diff --quiet -- supabase/migrations/20260723010000_process_day_boundary_transaction.sql; then
            echo "Gate 9D3 SQL precedence fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260723010000_process_day_boundary_transaction.sql
          git commit -m "fix(gate9d3): parenthesize boundary JSON identifiers"
          git push origin HEAD:agent/gate9d3-day1-boundary
