name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  contracts-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Record Gate 8D deployment status
        if: github.event_name == 'pull_request' && github.head_ref == 'docs/gate-8d-development-status'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text(encoding="utf-8")
          heading = "## 2026-07-21 — Gate 8D development migration and deployment blocker"
          if heading not in text:
              section = """## 2026-07-21 — Gate 8D development migration and deployment blocker

          - Applied reviewed migration `20260721124455 expedition_bootstrap_runtime_release` to development-only `VOYAGE`.
          - Verified remote `expedition_bootstrap_v1` metadata, including protected Gate 8C SHA `6175902f32a73a08476111befcb9e9be36e219bf`.
          - Confirmed zero Profiles, Expeditions, memberships, Participants, invitations, receipts, events and projection documents after migration.
          - Reviewed Supabase security and performance advisors; no new Gate 8D DDL issue was introduced.
          - Kept `command-gateway` undeployed because the connected management capability cannot configure mandatory Edge Function secret `ILKA_DEFAULT_RUNTIME_RELEASE_KEY=expedition_bootstrap_v1`.

          JWT verification was not weakened, no runtime fallback was hard-coded and no direct SQL bootstrap was substituted for the public gateway. Gate 8D is runtime-registered and migration-deployed, but Edge Function deployment and authenticated live smoke remain blocked until the required server environment value is configured.

          """
              section = "\n".join(line[10:] if line.startswith("          ") else line for line in section.splitlines()) + "\n"
              marker = "# Changelog\n\n"
              if not text.startswith(marker):
                  raise SystemExit("unexpected CHANGELOG header")
              path.write_text(marker + section + text[len(marker):], encoding="utf-8")
          PY
          if git diff --quiet -- CHANGELOG.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(gate8d): record development deployment status"
          git push origin HEAD:docs/gate-8d-development-status

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate command gateway contract
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Validate canonical repository
        run: python scripts/validate_repository.py .

      - name: Validate Expedition bootstrap contract
        run: python scripts/validate_expedition_bootstrap_contract.py

      - name: Validate Expedition bootstrap transaction
        run: python scripts/validate_expedition_bootstrap_transaction.py

      - name: Validate Expedition bootstrap release
        run: python scripts/validate_expedition_bootstrap_release.py

      - name: Run test suite
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design-system sources
        working-directory: frontend
        run: npm run generate:design

      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts

      - name: Validate frontend sources
        working-directory: frontend
        run: npm run validate:sources

      - name: Validate frontend offline synchronization contract
        run: python scripts/validate_frontend_offline_sync.py

      - name: Validate service worker syntax
        run: node --check frontend/public/sw.js

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

      - name: Build static Day 1 preview
        working-directory: frontend
        run: npm run build:preview

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format generated command gateway contract
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/_shared/command-gateway/command-contract.generated.ts

      - name: Check command gateway and Engine runtime formatting
        run: deno fmt --check --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime

      - name: Lint command gateway and Engine runtime
        run: deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime

      - name: Typecheck command gateway and Engine runtime
        run: deno check --frozen --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/index.ts supabase/functions/command-gateway/tests/unit/*.ts supabase/functions/command-gateway/tests/integration/*.ts supabase/functions/_shared/engine-runtime/*.ts

      - name: Run command gateway and Engine runtime unit tests
        run: deno test --frozen --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/tests/unit

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Rebuild local database from migrations
        run: supabase db reset

      - name: Run Supabase database tests
        run: supabase test db

      - name: Lint Supabase database
        run: supabase db lint --local --level error

      - name: Run command gateway database integration
        shell: bash
        run: |
          db_url="$(supabase status -o json | jq -r '.DB_URL')"
          SUPABASE_DB_URL="$db_url" deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            --allow-env=SUPABASE_DB_URL \
            --allow-net=127.0.0.1:54322 \
            supabase/functions/command-gateway/tests/integration

      - name: Generate Supabase database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Validate Supabase Foundation contract
        run: python scripts/validate_supabase_foundation.py

      - name: Validate Supabase identity and membership contract
        run: python scripts/validate_supabase_identity_membership.py

      - name: Validate Supabase immutable history contract
        run: python scripts/validate_supabase_immutable_history.py

      - name: Validate Supabase atomic command transaction contract
        run: python scripts/validate_supabase_atomic_command_transaction.py

      - name: Validate Supabase command gateway contract
        run: python scripts/validate_supabase_command_gateway.py

      - name: Validate Supabase Day 1 vertical contract
        run: python scripts/validate_supabase_day1_vertical.py

      - name: Verify generated sources are committed
        shell: bash
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            git diff --exit-code || true
            exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
