name: Apply Gate 9D3 PostgreSQL fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-postgresql-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gate 9D3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d3-day1-boundary
          fetch-depth: 0

      - name: Replace unsupported JSON object length call
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("supabase/migrations/20260723010000_process_day_boundary_transaction.sql")
          text = path.read_text(encoding="utf-8")
          old = "     or jsonb_object_length(v_command -> 'payload') <> 2 then"
          new = """     or (
            select count(*)
            from jsonb_object_keys(v_command -> 'payload')
          ) <> 2 then"""
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("Gate 9D3 payload key-count marker drifted")
          PY

      - name: Commit PostgreSQL compatibility fix
        shell: bash
        run: |
          if git diff --quiet -- supabase/migrations/20260723010000_process_day_boundary_transaction.sql; then
            echo "Gate 9D3 PostgreSQL fix already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/20260723010000_process_day_boundary_transaction.sql
          git commit -m "fix(gate9d3): count boundary payload keys portably"
          git push origin HEAD:agent/gate9d3-day1-boundary
