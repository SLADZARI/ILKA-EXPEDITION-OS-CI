name: Regenerate Gate 9D3 canonical sources

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate-canonical-sources:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Gate 9D3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d3-day1-boundary
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install generator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate command gateway contract
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design-system and frontend contracts
        working-directory: frontend
        run: |
          npm run generate:design
          npm run generate:contracts

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format generated command gateway contract
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/_shared/command-gateway/command-contract.generated.ts

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start and rebuild local Supabase
        run: |
          supabase start
          supabase db reset

      - name: Generate database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Commit canonical generated sources
        shell: bash
        run: |
          git add -A
          git reset -- .github/workflows/validate.yml
          if git diff --cached --quiet; then
            echo "All canonical generated sources are already current."
            exit 0
          fi
          git status --short
          git diff --cached --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(gate9d3): refresh canonical generated sources"
          git push origin HEAD:agent/gate9d3-day1-boundary

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
