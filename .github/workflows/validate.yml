name: Gate 9B1 branch builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-gate9b1:
    if: github.head_ref == 'feat/gate-9b1-canonical-setup-contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repository dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Apply Gate 9B1 canonical contract changes
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/apply_gate9b1_contract.py 2>&1 | tee gate9b1-builder-error.log

      - name: Upload deterministic builder diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gate9b1-builder-error
          path: gate9b1-builder-error.log

      - name: Stop after builder diagnostic
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Generate command gateway contract
        if: steps.apply.outcome == 'success'
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Deno
        if: steps.apply.outcome == 'success'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format generated gateway contract
        if: steps.apply.outcome == 'success'
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/_shared/command-gateway/command-contract.generated.ts

      - name: Set up Node
        if: steps.apply.outcome == 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate frontend command contracts
        if: steps.apply.outcome == 'success'
        working-directory: frontend
        run: |
          npm ci
          npm run generate:contracts

      - name: Validate Gate 9B1 before commit
        if: steps.apply.outcome == 'success'
        run: |
          python scripts/validate_repository.py .
          python scripts/validate_expedition_setup_contract.py
          pytest -q tests/test_expedition_setup_contract.py

      - name: Restore protected workflow and remove builder files
        if: steps.apply.outcome == 'success'
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/validate.yml
          git rm scripts/apply_gate9b1_contract.py .github/workflows/gate9b1-builder.yml
          rm -f gate9b1-builder-error.log

      - name: Commit final Gate 9B1 branch
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(gate9b1): publish canonical Expedition setup contracts"
          git push origin HEAD:${{ github.head_ref }}
