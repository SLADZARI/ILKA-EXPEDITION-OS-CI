name: Validate Gate 9D3 focused integration

on:
  pull_request:

permissions:
  contents: read

jobs:
  gate9d3-focused-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Rebuild local database from migrations
        run: supabase db reset

      - name: Run Gate 9D3 boundary integration
        shell: bash
        run: |
          db_url="$(supabase status -o json | jq -r '.DB_URL')"
          SUPABASE_DB_URL="$db_url" deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            --allow-env=SUPABASE_DB_URL \
            --allow-net=127.0.0.1:54322 \
            supabase/functions/command-gateway/tests/integration/day1-boundary-execution.test.ts

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
