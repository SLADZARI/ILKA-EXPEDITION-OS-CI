name: Validate repository

# CI retrigger after GitHub Actions startup failure on 2026-07-20.
on:
  pull_request:
  push:
    branches:
      - main
      - chore/bootstrap-canonical-repository

permissions:
  contents: read

jobs:
  contracts-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate canonical repository
        run: python scripts/validate_repository.py .

      - name: Run test suite
        run: pytest -q
