name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  identity-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Run database diagnostics
        shell: bash
        run: |
          set +e
          supabase start >/tmp/supabase-start.log 2>&1
          start_status=$?
          if [[ $start_status -ne 0 ]]; then
            tail -n 200 /tmp/supabase-start.log > /tmp/identity-test-tail.log
            cat /tmp/identity-test-tail.log
            exit $start_status
          fi

          supabase db reset >/tmp/supabase-reset.log 2>&1
          reset_status=$?
          if [[ $reset_status -ne 0 ]]; then
            tail -n 200 /tmp/supabase-reset.log > /tmp/identity-test-tail.log
            cat /tmp/identity-test-tail.log
            exit $reset_status
          fi

          supabase test db >/tmp/identity-test.log 2>&1
          test_status=$?
          tail -n 200 /tmp/identity-test.log > /tmp/identity-test-tail.log
          cat /tmp/identity-test-tail.log
          exit $test_status

      - name: Upload database diagnostic tail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-test-tail
          path: /tmp/identity-test-tail.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true

  contracts-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate canonical repository
        run: python scripts/validate_repository.py .

      - name: Run test suite
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design-system sources
        working-directory: frontend
        run: npm run generate:design

      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts

      - name: Validate frontend sources
        working-directory: frontend
        run: npm run validate:sources

      - name: Validate service worker syntax
        run: node --check frontend/public/sw.js

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

      - name: Build static Day 1 preview
        working-directory: frontend
        run: npm run build:preview

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Rebuild local database from migrations
        run: supabase db reset

      - name: Run Supabase database tests
        run: supabase test db

      - name: Lint Supabase database
        run: supabase db lint --local --level error

      - name: Generate Supabase database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Validate Supabase Foundation contract
        run: python scripts/validate_supabase_foundation.py

      - name: Validate Supabase identity and membership contract
        run: python scripts/validate_supabase_identity_membership.py

      - name: Verify generated sources are committed
        shell: bash
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            git diff --exit-code || true
            exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
