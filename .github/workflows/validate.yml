name: Validate repository

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contracts-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate canonical repository
        run: python scripts/validate_repository.py .

      - name: Run test suite
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design-system sources
        working-directory: frontend
        run: npm run generate:design

      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts

      - name: Validate frontend sources
        working-directory: frontend
        run: npm run validate:sources

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify generated frontend sources are committed
        run: git diff --exit-code
