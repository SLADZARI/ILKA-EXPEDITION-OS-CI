name: Gate 8A status docs

on:
  push:
    branches:
      - feat/expedition-bootstrap-contract
    paths:
      - ".github/workflows/gate8a-status-docs.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 8A branch
        uses: actions/checkout@v4
        with:
          ref: feat/expedition-bootstrap-contract

      - name: Update README and CHANGELOG
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          marker = 'The complete local `complete_task` path is now transport-ready, but live cloud execution still requires deployment of `command-gateway`, authenticated session composition and an actual bootstrapped Expedition/Participant/TodayView.\n'
          section = '''

Gate 8A Expedition bootstrap contract is accepted under `ADR-017`:

- `create_expedition` remains on the single public `command-gateway` transport;
- only this command uses a pre-membership authenticated Profile path;
- the server selects and pins `ILKA_DEFAULT_RUNTIME_RELEASE_KEY`;
- `private.bootstrap_expedition(jsonb)` will atomically create the draft Expedition, active Captain membership, stream/projection heads, accepted receipt and `expedition.created` event;
- accepted bootstrap ends at stream position `1` and projection version `0`;
- no Participant, invitation, rotation, Day, Stage, assignment, Card Bundle or projection document is created by this gate.

Gate 8A is contract-only. The transaction migration, bootstrap reducer, gateway implementation, runtime release registration and live deployment remain separate subgates.
'''
          if 'Gate 8A Expedition bootstrap contract is accepted under `ADR-017`' not in text:
              if marker not in text:
                  raise SystemExit('README Gate 7 marker not found')
              text = text.replace(marker, marker + section, 1)
          if 'python scripts/validate_expedition_bootstrap_contract.py' not in text:
              text = text.replace(
                  'python scripts/validate_frontend_offline_sync.py\n',
                  'python scripts/validate_frontend_offline_sync.py\npython scripts/validate_expedition_bootstrap_contract.py\n',
                  1,
              )
          readme.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          heading = '## 2026-07-21 — Gate 8A Expedition bootstrap contract\n'
          section = '''## 2026-07-21 — Gate 8A Expedition bootstrap contract

- Accepted `ADR-017` for executing canonical `create_expedition` through the existing authenticated `command-gateway` rather than a second public bootstrap endpoint.
- Defined the one pre-membership path: authenticated active Profile becomes the new Expedition Captain only after atomic commit.
- Fixed server-side runtime selection through `ILKA_DEFAULT_RUNTIME_RELEASE_KEY`; the browser cannot select or silently upgrade the Expedition runtime.
- Defined `private.bootstrap_expedition(jsonb)` as a structural wrapper around existing immutable command persistence.
- Defined exact initial state: draft Expedition, one active Captain membership, stream position `1`, projection version `0`, one accepted receipt and one `expedition.created` event.
- Added the private bootstrap request JSON Schema, architecture contract, API transport projection and protected Gate 8A validator.
- Explicitly excluded Participants, invitations, rotation, Expedition start, Day 1, Stage opening, assignments, Card Bundles and read projections.

This subgate changes contracts and architecture only. It adds no migration, reducer implementation, Edge Function behavior, runtime release row, cloud Expedition or pilot data.

'''
          if heading not in text:
              text = text.replace('# Changelog\n\n', '# Changelog\n\n' + section, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

      - name: Commit status documentation
        run: |
          git add README.md CHANGELOG.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(gate8a): record Expedition bootstrap contract"
          git push origin HEAD:feat/expedition-bootstrap-contract
