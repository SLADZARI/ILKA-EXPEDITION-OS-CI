name: Add frontend test dependencies

on:
  pull_request:
    paths:
      - '.github/workflows/add-frontend-test-dependencies.yml'

permissions:
  contents: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Add exact test dependencies
        working-directory: frontend
        run: npm install --save-dev --save-exact vitest fake-indexeddb

      - name: Commit dependency manifest and lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json
          git commit -m "test(frontend): add IndexedDB queue test dependencies"
          git push origin HEAD:${{ github.head_ref }}
