name: Gate 9B2C compatibility patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2c-invitation-execution
          token: ${{ github.token }}

      - name: Restore persistence gate boundary marker
        shell: python
        run: |
          from pathlib import Path
          path = Path('docs/decisions/ADR-019-invitation-transaction-boundaries.md')
          text = path.read_text(encoding='utf-8')
          marker = 'Gate 9B2B implemented structural persistence wrappers and the Captain setup read API.'
          replacement = 'Gate 9B2B does not add reducers; it implemented structural persistence wrappers and the Captain setup read API.'
          if marker not in text:
              raise SystemExit('ADR-019 Gate 9B2B marker missing')
          path.write_text(text.replace(marker, replacement, 1), encoding='utf-8')

      - name: Validate Gate 9B2B persistence compatibility
        run: python scripts/validate_expedition_invitation_persistence.py

      - name: Commit compatibility marker
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/decisions/ADR-019-invitation-transaction-boundaries.md
          git commit -m "docs(gate9b2c): preserve Gate 9B2B reducer boundary"
          git push origin HEAD:feat/gate-9b2c-invitation-execution
