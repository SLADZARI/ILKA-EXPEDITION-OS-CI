name: Atomic command deployment docs

on:
  push:
    branches:
      - docs/supabase-atomic-command-deployment

permissions:
  contents: write

jobs:
  update-deployment-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs/supabase-atomic-command-deployment

      - name: Record deployment in long-form docs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          changelog = Path('CHANGELOG.md')
          changelog_text = changelog.read_text(encoding='utf-8')
          marker = '## 2026-07-20 — Supabase Atomic Command Transaction deployment'
          if marker not in changelog_text:
              section = '''## 2026-07-20 — Supabase Atomic Command Transaction deployment

          - Applied the reviewed Atomic Command Transaction migration to development-only `VOYAGE` (`rehfxjlyfojkpascjtmb`).
          - Recorded remote migration version `20260720185027` with migration name `atomic_command_transaction`.
          - Deployed `ilka.projection_heads`, `ilka.projection_documents`, `private.process_command(jsonb)` and the internal projection-head/receipt-result helpers.
          - Verified forced RLS, browser denial, SELECT-only projection access for `service_role`, no direct projection writes and no `service_role` access to the internal serializer.
          - Verified the Expedition projection-head initialization trigger.
          - Confirmed that all identity, history and projection tables remain empty.

          This development deployment does not add `command-gateway`, TypeScript reducers, concrete read models, public API functions, frontend transport, Realtime, scheduler, Storage, pilot data or production data. The next gate is Command Gateway.

          '''
              changelog.write_text(changelog_text.replace('# Changelog\n\n', '# Changelog\n\n' + section, 1), encoding='utf-8')

          architecture = Path('docs/architecture/supabase-atomic-command-transaction.md')
          architecture_text = architecture.read_text(encoding='utf-8')
          deployment_marker = '## Development deployment record'
          if deployment_marker not in architecture_text:
              appendix = '''

          ## Development deployment record

          The reviewed Gate 4 implementation was merged through PR `#19` at commit `448fb6e9fac0521f9c9660c4d1ae5400ed16d186` after protected CI run `29768781004` passed 221 pgTAP assertions and all repository gates.

          It was applied to development-only `VOYAGE` as remote migration `20260720185027 atomic_command_transaction`. Full remote verification is recorded in `docs/deployments/2026-07-20-supabase-atomic-command-transaction.md`.

          The deployment contains no Expedition, actor, command, event or projection data. The next gate remains Command Gateway.
          '''
              architecture.write_text(architecture_text.rstrip() + appendix + '\n', encoding='utf-8')
          PY

      - name: Commit deployment documentation
        shell: bash
        run: |
          git add CHANGELOG.md docs/architecture/supabase-atomic-command-transaction.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(supabase): finalize atomic transaction deployment record"
          git push origin HEAD:docs/supabase-atomic-command-deployment
