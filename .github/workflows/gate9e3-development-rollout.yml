name: Gate 9E3 development rollout

on:
  push:
    branches:
      - ops/gate9e3-development-rollout

permissions:
  contents: read

concurrency:
  group: gate9e3-development-rollout
  cancel-in-progress: false

jobs:
  rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: development
    steps:
      - name: Checkout protected main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify rollout secrets and JWT contract
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ILKA_SYSTEM_CLOCK_HMAC_SECRET: ${{ secrets.ILKA_SYSTEM_CLOCK_HMAC_SECRET }}
          ILKA_ALLOWED_ORIGINS: ${{ secrets.ILKA_ALLOWED_ORIGINS }}
        run: |
          for name in SUPABASE_ACCESS_TOKEN ILKA_SYSTEM_CLOCK_HMAC_SECRET ILKA_ALLOWED_ORIGINS; do
            if [[ -z "${!name}" ]]; then
              echo "$name is not configured for the development environment."
              exit 1
            fi
          done
          grep -A2 '^\[functions.command-gateway\]' supabase/config.toml | grep -q 'verify_jwt = true'

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Verify existing database secret
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets list --project-ref rehfxjlyfojkpascjtmb > /tmp/secrets.txt
          grep -q 'SUPABASE_DB_URL' /tmp/secrets.txt

      - name: Configure Day 1 pilot environment
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ILKA_SYSTEM_CLOCK_HMAC_SECRET: ${{ secrets.ILKA_SYSTEM_CLOCK_HMAC_SECRET }}
          ILKA_ALLOWED_ORIGINS: ${{ secrets.ILKA_ALLOWED_ORIGINS }}
        run: |
          supabase secrets set \
            ILKA_DEFAULT_RUNTIME_RELEASE_KEY=day1_pilot_v1 \
            ILKA_SYSTEM_CLOCK_HMAC_SECRET="$ILKA_SYSTEM_CLOCK_HMAC_SECRET" \
            ILKA_ALLOWED_ORIGINS="$ILKA_ALLOWED_ORIGINS" \
            --project-ref rehfxjlyfojkpascjtmb

      - name: Deploy protected command gateway
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy command-gateway \
            --project-ref rehfxjlyfojkpascjtmb \
            --use-api
          supabase functions list --project-ref rehfxjlyfojkpascjtmb | tee /tmp/functions.txt
          grep -q 'command-gateway' /tmp/functions.txt

      - name: Verify platform JWT rejection
        shell: bash
        run: |
          status="$(curl -sS -o /tmp/unauthenticated-body.txt -w '%{http_code}' \
            https://rehfxjlyfojkpascjtmb.supabase.co/functions/v1/command-gateway)"
          test "$status" = '401'
