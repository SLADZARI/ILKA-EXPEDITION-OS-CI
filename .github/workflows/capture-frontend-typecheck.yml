name: Capture frontend typecheck diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/capture-frontend-typecheck.yml'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Capture TypeScript diagnostics
        working-directory: frontend
        run: npm run typecheck > typecheck-errors.txt 2>&1 || true

      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/typecheck-errors.txt
          git commit -m "chore(frontend): capture typecheck diagnostics"
          git push origin HEAD:${{ github.head_ref }}
