name: Gate 9C database diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  database-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start and rebuild local Supabase
        run: |
          supabase start
          supabase db reset

      - name: Run database tests
        id: db-tests
        continue-on-error: true
        shell: bash
        run: supabase test db > gate9c-db-test-error.txt 2>&1

      - name: Upload database diagnostic
        if: steps.db-tests.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gate9c-db-test-error
          path: gate9c-db-test-error.txt
          if-no-files-found: error

      - name: Stop on database test failure
        if: steps.db-tests.outcome != 'success'
        run: |
          tail -n 240 gate9c-db-test-error.txt
          exit 1

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
