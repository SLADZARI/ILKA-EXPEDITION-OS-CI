name: Gate 9B2C integration diagnostic

on:
  pull_request:

permissions:
  contents: write

jobs:
  integration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2c-invitation-execution
          token: ${{ github.token }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Expose safe internal persistence diagnostic
        shell: python
        run: |
          from pathlib import Path
          test_path = Path('supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts')
          text = test_path.read_text(encoding='utf-8')
          text = text.replace(
              '      assertEquals(accepted.ok, true);',
              '''      if (!accepted.ok) {
                throw new Error(`acceptance_outcome:${JSON.stringify({
                  status: accepted.status,
                  code: accepted.code,
                  message: accepted.message,
                  retryable: accepted.retryable,
                  details: accepted.details,
                })}`);
              }''',
              1,
          )
          test_path.write_text(text, encoding='utf-8')

          executor_path = Path('supabase/functions/_shared/command-gateway/invitation.ts')
          executor = executor_path.read_text(encoding='utf-8')
          old = '''      } catch (error) {
                return databaseFailure(error);
              }'''
          new = '''      } catch (error) {
                throw error;
              }'''
          if old not in executor:
              raise SystemExit('persistence diagnostic insertion point missing')
          executor_path.write_text(executor.replace(old, new, 1), encoding='utf-8')

      - name: Run invitation integration and persist failure
        shell: bash
        run: |
          supabase start >/tmp/supabase-start.log 2>&1
          supabase db reset >/tmp/supabase-reset.log 2>&1
          db_url="$(supabase status -o json | jq -r '.DB_URL')"
          if ! SUPABASE_DB_URL="$db_url" deno test \
            --config supabase/functions/command-gateway/deno.json \
            --allow-env=SUPABASE_DB_URL \
            --allow-net=127.0.0.1:54322 \
            supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts \
            >/tmp/gate9b2c-integration.log 2>&1; then
            tail -n 220 /tmp/gate9b2c-integration.log > gate9b2c-integration-error.txt
            cat gate9b2c-integration-error.txt
            git checkout -- supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts supabase/functions/_shared/command-gateway/invitation.ts
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gate9b2c-integration-error.txt
            git commit -m "chore(gate9b2c): capture persistence diagnostic"
            git push origin HEAD:feat/gate-9b2c-invitation-execution
            exit 1
          fi
          rm -f gate9b2c-integration-error.txt

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true
