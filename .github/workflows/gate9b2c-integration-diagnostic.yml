name: Gate 9B2C integration correction commit

on:
  pull_request:

permissions:
  contents: write

jobs:
  commit-correction:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2c-invitation-execution
          token: ${{ github.token }}

      - name: Apply verified fixture correction
        shell: python
        run: |
          from pathlib import Path
          path = Path('supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts')
          text = path.read_text(encoding='utf-8')
          old = 'now: () => new Date("2026-07-21T21:05:00Z"),'
          new = 'now: () => new Date("2026-07-21T21:05:03Z"),'
          if text.count(old) != 1:
              raise SystemExit(f'integration clock replacement count: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('gate9b2c-integration-error.txt').unlink(missing_ok=True)

      - name: Commit verified correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(gate9b2c): align receipt time after issued commands"
          git push origin HEAD:feat/gate-9b2c-invitation-execution
