name: Gate 9B2C integration correction

on:
  pull_request:

permissions:
  contents: write

jobs:
  integration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2c-invitation-execution
          token: ${{ github.token }}

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Correct trusted server receipt time
        shell: python
        run: |
          from pathlib import Path
          path = Path('supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts')
          text = path.read_text(encoding='utf-8')
          old = 'now: () => new Date("2026-07-21T21:05:00Z"),'
          new = 'now: () => new Date("2026-07-21T21:05:03Z"),'
          if text.count(old) != 1:
              raise SystemExit(f'integration clock replacement count: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

      - name: Run corrected invitation integration
        id: integration
        continue-on-error: true
        shell: bash
        run: |
          supabase start >/tmp/supabase-start.log 2>&1
          supabase db reset >/tmp/supabase-reset.log 2>&1
          db_url="$(supabase status -o json | jq -r '.DB_URL')"
          SUPABASE_DB_URL="$db_url" deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            --allow-env=SUPABASE_DB_URL \
            --allow-net=127.0.0.1:54322 \
            supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts \
            >/tmp/gate9b2c-integration.log 2>&1

      - name: Persist correction or diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ steps.integration.outcome }}" == "success" ]]; then
            rm -f gate9b2c-integration-error.txt
            git add -A gate9b2c-integration-error.txt supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts
            message="test(gate9b2c): align receipt time after issued commands"
          else
            tail -n 160 /tmp/gate9b2c-integration.log > gate9b2c-integration-error.txt
            cat gate9b2c-integration-error.txt
            git checkout -- supabase/functions/command-gateway/tests/integration/invitation-execution.test.ts
            git add gate9b2c-integration-error.txt
            message="chore(gate9b2c): capture corrected integration error"
          fi
          if ! git diff --cached --quiet; then
            git commit -m "$message"
            git push origin HEAD:feat/gate-9b2c-invitation-execution
          fi
          if [[ "${{ steps.integration.outcome }}" != "success" ]]; then
            exit 1
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true
