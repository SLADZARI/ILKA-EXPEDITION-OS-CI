name: Gate 8B bootstrap transaction patch

on:
  pull_request:
    paths:
      - ".github/workflows/gate8b-bootstrap-patch.yml"
      - "supabase/migrations/20260721103000_expedition_bootstrap_transaction.sql"
      - "supabase/tests/expedition_bootstrap_transaction.test.sql"
      - "scripts/validate_expedition_bootstrap_transaction.py"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 8B branch
        uses: actions/checkout@v4
        with:
          ref: feat/expedition-bootstrap-transaction

      - name: Align migration, tests and generated types
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path('supabase/migrations/20260721103000_expedition_bootstrap_transaction.sql')
          text = migration.read_text(encoding='utf-8')
          text = text.replace(
              '  select receipt.*, expedition.expedition_key\n',
              '  select receipt, expedition.expedition_key\n',
              1,
          )
          migration.write_text(text, encoding='utf-8')

          test = Path('supabase/tests/expedition_bootstrap_transaction.test.sql')
          text = test.read_text(encoding='utf-8')
          text = text.replace(
              "p.proconfig = array['search_path=']::text[]",
              "p.proconfig @> array['search_path=\"\"']::text[]",
              1,
          )
          test.write_text(text, encoding='utf-8')

          types = Path('supabase/database.types.ts')
          text = types.read_text(encoding='utf-8')
          marker = '      assert_expected_stream_position: {\n'
          addition = '      bootstrap_expedition: { Args: { p_request: Json }; Returns: Json }\n'
          if '      bootstrap_expedition:' not in text:
              if marker not in text:
                  raise SystemExit('private Functions marker not found')
              text = text.replace(marker, addition + marker, 1)
          types.write_text(text, encoding='utf-8')
          PY

      - name: Commit prepared sources
        run: |
          git add \
            supabase/migrations/20260721103000_expedition_bootstrap_transaction.sql \
            supabase/tests/expedition_bootstrap_transaction.test.sql \
            supabase/database.types.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test(gate8b): align bootstrap transaction gate"
          git push origin HEAD:feat/expedition-bootstrap-transaction
