name: Finalize Gate 9D2B

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gate 9D2B branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d2b-route-start-expedition
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic documentation finalization
        run: python scripts/finalize_gate9d2b.py

      - name: Commit finalized Gate 9D2B documentation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md supabase/functions/command-gateway/tests/integration/start-execution.test.ts
          if ! git diff --cached --quiet; then
            git commit -m "docs(gate9d2b): record Expedition start gateway"
            git push origin HEAD:agent/gate9d2b-route-start-expedition
          fi
