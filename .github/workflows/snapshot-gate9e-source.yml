name: Apply Gate 9E1 pilot runtime

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/gate9e-day1-pilot-release'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Gate 9E branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9e-day1-pilot-release
          fetch-depth: 0

      - name: Apply Gate 9E1 product patch
        shell: bash
        run: |
          if [[ ! -f .gate9e1.patch.gz.b64 ]]; then
            echo "Gate 9E1 product patch is already applied."
            exit 0
          fi
          base64 -d .gate9e1.patch.gz.b64 | gzip -d > /tmp/gate9e1.patch
          git apply --check /tmp/gate9e1.patch
          git apply /tmp/gate9e1.patch
          rm .gate9e1.patch.gz.b64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Gate 9E1 contracts
        shell: bash
        run: |
          python -m pip install -r requirements-dev.txt
          python scripts/generate_day1_pilot_policy.py
          python scripts/validate_repository.py .
          python scripts/validate_day1_pilot_runtime.py
          pytest -q

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format and check Gate 9E1 runtime
        shell: bash
        run: |
          deno fmt --config supabase/functions/command-gateway/deno.json \
            supabase/functions/_shared/engine-runtime/day1-pilot-policy.generated.ts \
            supabase/functions/_shared/engine-runtime/day1-pilot-v1.ts \
            supabase/functions/command-gateway/tests/unit/day1-pilot-runtime.test.ts
          deno lint --config supabase/functions/command-gateway/deno.json \
            supabase/functions/_shared/engine-runtime/day1-pilot-v1.ts \
            supabase/functions/command-gateway/tests/unit/day1-pilot-runtime.test.ts
          deno check --frozen --config supabase/functions/command-gateway/deno.json \
            supabase/functions/_shared/engine-runtime/day1-pilot-v1.ts \
            supabase/functions/command-gateway/tests/unit/day1-pilot-runtime.test.ts
          deno test --frozen --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/tests/unit/day1-pilot-runtime.test.ts

      - name: Commit Gate 9E1 product changes
        shell: bash
        run: |
          if git diff --quiet --exit-code; then
            echo "Gate 9E1 product changes are already published."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(gate9e1): compose Day 1 pilot runtime"
          git push origin HEAD:agent/gate9e-day1-pilot-release
