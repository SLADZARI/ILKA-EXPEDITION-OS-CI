name: Debug Gate 9D3 unit tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Capture unit output
        shell: bash
        run: |
          set +e
          deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/tests/unit \
            > gate9d3-unit.log 2>&1
          status=$?
          printf 'exit_status=%s\n' "$status" >> gate9d3-unit.log
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: gate9d3-unit-log
          path: gate9d3-unit.log
          if-no-files-found: error
          retention-days: 1
