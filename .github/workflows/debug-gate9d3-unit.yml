name: Debug Gate 9D3 unit tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Inject local diagnostic output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("supabase/functions/command-gateway/tests/unit/day1-boundary-executor.test.ts")
          text = path.read_text(encoding="utf-8")
          marker = "  assertEquals(outcome.ok, true);"
          replacement = "  console.log(JSON.stringify(outcome, null, 2));\n" + marker
          if text.count(marker) != 1:
              raise SystemExit("executor success assertion marker drifted")
          path.write_text(text.replace(marker, replacement, 1), encoding="utf-8")
          PY

      - name: Capture focused unit output
        shell: bash
        run: |
          set +e
          deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            --filter "prepares one null-actor atomic request" \
            supabase/functions/command-gateway/tests/unit/day1-boundary-executor.test.ts \
            > gate9d3-unit.log 2>&1
          status=$?
          printf 'exit_status=%s\n' "$status" >> gate9d3-unit.log
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: gate9d3-unit-log
          path: gate9d3-unit.log
          if-no-files-found: error
          retention-days: 1
