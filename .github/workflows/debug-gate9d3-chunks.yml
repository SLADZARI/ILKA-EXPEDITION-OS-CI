name: Debug Gate 9D3 chunks

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-chunks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture chunk sizes and hashes
        shell: bash
        run: |
          wc -c .gate9d3/chunk-*.b64 > gate9d3-chunks.log
          sha256sum .gate9d3/chunk-*.b64 >> gate9d3-chunks.log

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: gate9d3-chunks-log
          path: gate9d3-chunks.log
          if-no-files-found: error
          retention-days: 1
