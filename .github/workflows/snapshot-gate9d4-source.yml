name: Apply Gate 9D4 vertical closure

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/gate9d4-vertical-closure'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Gate 9D4 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d4-vertical-closure
          fetch-depth: 0

      - name: Apply Gate 9D4 patch
        shell: bash
        run: |
          if [[ ! -f .gate9d4.patch.gz.b64 ]]; then
            echo "Gate 9D4 product patch is already applied."
            exit 0
          fi
          base64 -d .gate9d4.patch.gz.b64 | gzip -d > /tmp/gate9d4.patch
          git apply --check /tmp/gate9d4.patch
          git apply /tmp/gate9d4.patch
          rm .gate9d4.patch.gz.b64

      - name: Validate staged Gate 9D4 sources
        shell: bash
        run: |
          python -m pip install -r requirements-dev.txt
          python scripts/validate_repository.py .
          python scripts/validate_expedition_day1_vertical_closure.py
          pytest -q

      - name: Commit Gate 9D4 product changes
        shell: bash
        run: |
          git checkout -- .github/workflows/validate.yml
          if git diff --quiet --exit-code; then
            echo "Gate 9D4 product changes are already published."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(gate9d4): close Day 1 vertical fixtures"
          git push origin HEAD:agent/gate9d4-vertical-closure
