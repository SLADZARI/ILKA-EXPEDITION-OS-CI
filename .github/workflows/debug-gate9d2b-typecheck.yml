name: Debug Gate 9D2B typecheck

on:
  pull_request:

permissions:
  contents: read

jobs:
  capture-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          deno check --frozen \
            --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/index.ts \
            supabase/functions/command-gateway/tests/unit/*.ts \
            supabase/functions/command-gateway/tests/integration/*.ts \
            supabase/functions/_shared/engine-runtime/*.ts \
            > gate9d2b-typecheck.log 2>&1
          status=$?
          printf 'exit_status=%s\n' "$status" >> gate9d2b-typecheck.log
          exit 0

      - name: Upload typecheck log
        uses: actions/upload-artifact@v4
        with:
          name: gate9d2b-typecheck-log
          path: gate9d2b-typecheck.log
          if-no-files-found: error
          retention-days: 1
