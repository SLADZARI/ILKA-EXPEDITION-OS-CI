name: Gate 6 validator patch

on:
  pull_request:
    paths:
      - "scripts/validate_supabase_day1_vertical.py"
      - ".github/workflows/gate6-validator-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 6 branch
        uses: actions/checkout@v4
        with:
          ref: feat/day1-complete-task-read-models

      - name: Align expected protected CI name
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate_supabase_day1_vertical.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '"Run command gateway unit tests",',
              '"Run command gateway and Engine runtime unit tests",',
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patch
        run: |
          git add scripts/validate_supabase_day1_vertical.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test(gate6): align protected CI contract wording"
          git push origin HEAD:feat/day1-complete-task-read-models
