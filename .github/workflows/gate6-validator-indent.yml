name: Gate 6 validator indentation repair

on:
  pull_request:
    paths:
      - ".github/workflows/gate6-validator-indent.yml"
      - "scripts/validate_supabase_day1_vertical.py"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout registration branch
        uses: actions/checkout@v4
        with:
          ref: feat/register-day1-complete-task-runtime

      - name: Repair registration validator block indentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/validate_supabase_day1_vertical.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('    registry = REGISTRY.read_text(encoding="utf-8")')
          end = text.index('    sql = MIGRATION.read_text(encoding="utf-8").lower()', start)
          block = '''    registry = REGISTRY.read_text(encoding="utf-8")
              require(
                  registry,
                  (
                      "createDay1CompleteTaskRuntime",
                      "day1CompleteTaskV1",
                      'release_key: "day1_complete_task_v1"',
                      'git_commit_sha: "edbfc911e9bcfddfb87a4adb6b39d21e1a5f2617"',
                      'rules_release: "engine_v8_permissions_v7_onboarding_v3"',
                      'content_release: "day1_content_v1"',
                      'reducer_version: "day1_complete_task_v1"',
                      "new StaticRuntimeRegistry([",
                  ),
                  "runtime registry missing exact Day 1 release",
                  errors,
              )

              registration_sql = REGISTRATION_MIGRATION.read_text(encoding="utf-8")
              require(
                  registration_sql,
                  (
                      "insert into ilka.runtime_releases",
                      "day1_complete_task_v1",
                      "edbfc911e9bcfddfb87a4adb6b39d21e1a5f2617",
                      "engine_v8_permissions_v7_onboarding_v3",
                      "day1_content_v1",
                  ),
                  "runtime release migration missing exact metadata",
                  errors,
              )

          '''
          # Normalize the block to four spaces inside main().
          block = ''.join(
              line[2:] if line.startswith('  ') else line
              for line in block.splitlines(keepends=True)
          )
          path.write_text(text[:start] + block + text[end:], encoding='utf-8')
          PY

      - name: Verify Python syntax and contract
        run: |
          python -m py_compile scripts/validate_supabase_day1_vertical.py
          python scripts/validate_supabase_day1_vertical.py

      - name: Commit repair
        run: |
          git add scripts/validate_supabase_day1_vertical.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(gate6): repair runtime registration validator indentation"
          git push origin HEAD:feat/register-day1-complete-task-runtime
