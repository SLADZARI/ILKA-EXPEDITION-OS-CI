name: Atomic command static diagnostics

on:
  pull_request:
    paths:
      - "scripts/validate_supabase_atomic_command_transaction.py"
      - "docs/architecture/supabase-atomic-command-transaction.md"
      - "docs/decisions/ADR-013-atomic-command-transaction-and-projection-document-store.md"
      - "supabase/**"
      - ".github/workflows/atomic-command-static-diagnostics.yml"

permissions:
  contents: read

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run atomic transaction validator
        shell: bash
        run: |
          set +e
          python scripts/validate_supabase_atomic_command_transaction.py > /tmp/atomic-command-validator.log 2>&1
          status=$?
          cat /tmp/atomic-command-validator.log
          exit $status
      - name: Upload validator output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomic-command-validator-output
          path: /tmp/atomic-command-validator.log
          if-no-files-found: error
          retention-days: 1
