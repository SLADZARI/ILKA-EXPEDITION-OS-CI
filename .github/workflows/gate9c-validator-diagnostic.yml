name: Gate 9C validator diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install PyYAML

      - name: Run Gate 9C validator
        id: validator
        continue-on-error: true
        shell: bash
        run: python scripts/validate_expedition_rotation.py > gate9c-validator-error.txt 2>&1

      - name: Upload validator diagnostic
        if: steps.validator.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gate9c-validator-error
          path: gate9c-validator-error.txt
          if-no-files-found: error

      - name: Stop on validator failure
        if: steps.validator.outcome != 'success'
        run: |
          cat gate9c-validator-error.txt
          exit 1
