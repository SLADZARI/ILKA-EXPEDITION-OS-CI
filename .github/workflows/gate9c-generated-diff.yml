name: Gate 9C generated source diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  generated-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install generator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate command gateway contract
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate design-system sources
        working-directory: frontend
        run: npm run generate:design

      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format generated command gateway contract
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/_shared/command-gateway/command-contract.generated.ts

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start and rebuild local Supabase
        run: |
          supabase start
          supabase db reset

      - name: Generate database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Capture generated diff
        shell: bash
        run: |
          git diff -- . ':!/.github/workflows/gate9c-generated-diff.yml' > gate9c-generated-diff.txt
          cat gate9c-generated-diff.txt

      - name: Upload generated diff
        uses: actions/upload-artifact@v4
        with:
          name: gate9c-generated-diff
          path: gate9c-generated-diff.txt
          if-no-files-found: error

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
