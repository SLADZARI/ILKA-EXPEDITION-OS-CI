name: Gate 9C generated contract correction

on:
  pull_request:

permissions:
  contents: write

jobs:
  correct-generated-contract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Gate 9C branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9c-deterministic-rotation
          token: ${{ github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts

      - name: Commit canonical generated contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/contracts/generated/command.ts
          git diff --cached --exit-code && exit 0
          git commit -m "chore(gate9c): refresh generated frontend command contract"
          git push origin HEAD:feat/gate-9c-deterministic-rotation
