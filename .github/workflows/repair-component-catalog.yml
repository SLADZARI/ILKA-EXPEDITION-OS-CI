name: Repair component catalog JSON

on:
  pull_request:
    paths:
      - '.github/workflows/repair-component-catalog.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Repair exact malformed states field
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path('design-system/components/component-catalog.with-ids.json')
          text = path.read_text(encoding='utf-8')
          broken = '"id":"xp_summary_card","figma_name":"Card/XP Summary","tier":"domain","variants":["default"],"states":"provisional","synced"]}'
          fixed = '"id":"xp_summary_card","figma_name":"Card/XP Summary","tier":"domain","variants":["default"],"states":["provisional","synced"]}'
          if broken not in text:
              raise SystemExit('Expected malformed xp_summary_card fragment was not found')
          text = text.replace(broken, fixed, 1)
          json.loads(text)
          path.write_text(text + ('\n' if not text.endswith('\n') else ''), encoding='utf-8')
          PY

      - name: Commit repaired catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add design-system/components/component-catalog.with-ids.json
          git commit -m "fix(design-system): repair component catalog JSON"
          git push origin HEAD:${{ github.head_ref }}
