name: Snapshot Gate 9D3 source

on:
  push:
    branches:
      - agent/gate9d3-day1-boundary

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        shell: bash
        run: |
          zip -qr gate9d3-source.zip . \
            -x '.git/*' \
            -x 'gate9d3-source.zip'

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: gate9d3-source
          path: gate9d3-source.zip
          if-no-files-found: error
          retention-days: 1
