name: Gate 6 source patch

on:
  push:
    branches:
      - feat/day1-complete-task-read-models
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Gate 6 branch
        uses: actions/checkout@v4
        with:
          ref: feat/day1-complete-task-read-models

      - name: Patch gateway projection validation
        run: |
          python - <<'PY'
          from pathlib import Path

          handler = Path('supabase/functions/_shared/command-gateway/handler.ts')
          text = handler.read_text(encoding='utf-8')
          marker = '''    const processedAt = dependencies.now().toISOString();
          '''
          block = '''    const projectionIssues = prepared.projection_mutations.flatMap(
              (mutation, index) =>
                dependencies.schemas
                  .validateProjection(mutation.schema_id, mutation.projection)
                  .map((issue) => ({
                    path: `/projection_mutations/${index}/projection${
                      issue.path === "/" ? "" : issue.path
                    }`,
                    message: issue.message,
                  })),
            );
            if (projectionIssues.length) {
              return errorResponse(
                500,
                requestId,
                "runtime_contract_invalid",
                "The pinned runtime produced an invalid authoritative projection.",
                false,
                origin,
                true,
                projectionIssues,
              );
            }

          '''
          if block not in text:
              if marker not in text:
                  raise SystemExit('handler insertion marker not found')
              text = text.replace(marker, block + marker, 1)
              handler.write_text(text, encoding='utf-8')

          tests = Path('supabase/functions/command-gateway/tests/unit/handler.test.ts')
          text = tests.read_text(encoding='utf-8')
          before = '''    validatePreparedEvent: () => [],
              validateProcessRequest: () => [],
          '''
          after = '''    validatePreparedEvent: () => [],
              validateProjection: () => [],
              validateProcessRequest: () => [],
          '''
          if 'validateProjection: () => [],' not in text:
              if before not in text:
                  raise SystemExit('handler test validator marker not found')
              text = text.replace(before, after, 1)

          test_marker = '''Deno.test("stream conflict maps to HTTP 409", async () => {
          '''
          test_block = '''Deno.test("invalid prepared projection is never sent to persistence", async () => {
            let persistenceCalled = false;
            const handler = createCommandGatewayHandler(dependencies({
              schemas: validators({
                validateProjection: () => [{ path: "/tasks", message: "invalid" }],
              }),
              database: database({
                processCommand: async () => {
                  persistenceCalled = true;
                  return result();
                },
              }),
            }));
            const response = await handler(post(command()));
            assertEquals(response.status, 500);
            assertEquals(persistenceCalled, false);
            const body = await json(response);
            assertEquals(
              (body.error as Record<string, unknown>).code,
              "runtime_contract_invalid",
            );
          });

          '''
          if test_block not in text:
              if test_marker not in text:
                  raise SystemExit('handler test insertion marker not found')
              text = text.replace(test_marker, test_block + test_marker, 1)
          tests.write_text(text, encoding='utf-8')
          PY

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format patched sources
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared

      - name: Commit source patch
        run: |
          git add supabase/functions/_shared/command-gateway/handler.ts \
            supabase/functions/command-gateway/tests/unit/handler.test.ts \
            supabase/functions/_shared/engine-runtime/day1-complete-task-v1.ts \
            supabase/functions/command-gateway/tests/unit/day1-complete-task-runtime.test.ts \
            supabase/functions/command-gateway/tests/unit/schema-validation.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(gateway): validate prepared read-model projections"
          git push origin HEAD:feat/day1-complete-task-read-models
