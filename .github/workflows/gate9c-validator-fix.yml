name: Gate 9C validator correction

on:
  pull_request:

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout Gate 9C branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9c-deterministic-rotation
          token: ${{ github.token }}

      - name: Correct validator and generated type
        shell: python
        run: |
          from pathlib import Path

          validator_path = Path('scripts/validate_expedition_rotation.py')
          validator = validator_path.read_text(encoding='utf-8')
          validator = validator.replace('import re\n', '', 1)

          runtime_marker = '            "lowest",\n'
          runtime_replacement = '            "const productCaptain = withOnboardRole.find",\n'
          if runtime_marker in validator:
              validator = validator.replace(runtime_marker, runtime_replacement, 1)
          elif runtime_replacement not in validator:
              raise SystemExit('runtime implementation marker missing')

          generated_start_marker = '    generated = GENERATED_CONTRACT.read_text(encoding="utf-8")\n'
          database_type_marker = '    if "generate_rotation: { Args: { p_request: Json }; Returns: Json }" not in DATABASE_TYPES.read_text(encoding="utf-8"):\n'
          generated_start = validator.find(generated_start_marker)
          generated_end = validator.find(database_type_marker, generated_start)
          if generated_start < 0 or generated_end < 0:
              raise SystemExit(f'generated validator boundaries missing: start={generated_start}, end={generated_end}')
          generated_block = '''    generated = GENERATED_CONTRACT.read_text(encoding="utf-8")
              rotation_start = generated.find('"generate_rotation": {')
              rotation_end = generated.find("\\n  },", rotation_start)
              rotation_block = generated[rotation_start:rotation_end] if rotation_start >= 0 and rotation_end >= 0 else ""
              if '"allowedActors": [' not in rotation_block or '"captain"' not in rotation_block or '"system"' in rotation_block:
                  errors.append("generated gateway contract must make rotation Captain-only")

          '''
          validator = validator[:generated_start] + generated_block + validator[generated_end:]
          validator_path.write_text(validator, encoding='utf-8')

          types_path = Path('supabase/database.types.ts')
          types = types_path.read_text(encoding='utf-8')
          generated_type = '      generate_rotation: { Args: { p_request: Json }; Returns: Json }\n'
          if generated_type not in types:
              marker = '      invite_participant: { Args: { p_request: Json }; Returns: Json }\n'
              if types.count(marker) != 1:
                  raise SystemExit(f'database type insertion marker count: {types.count(marker)}')
              types = types.replace(marker, generated_type + marker, 1)
          types_path.write_text(types, encoding='utf-8')

      - name: Run Gate 9C validator
        run: python scripts/validate_expedition_rotation.py

      - name: Commit permanent correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate_expedition_rotation.py supabase/database.types.ts
          git commit -m "test(gate9c): align validator with generated rotation sources"
          git push origin HEAD:feat/gate-9c-deterministic-rotation
