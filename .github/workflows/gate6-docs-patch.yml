name: Gate 6 status docs patch

on:
  pull_request:
    paths:
      - ".github/workflows/gate6-docs-patch.yml"
      - "README.md"
      - "supabase/README.md"
      - "CHANGELOG.md"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 6 branch
        uses: actions/checkout@v4
        with:
          ref: feat/day1-complete-task-read-models

      - name: Update implementation status documents
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          marker = '''Gate 5 intentionally registers no production reducer bundle. New valid commands return retryable `runtime_release_unavailable` without a receipt, event or projection write until Gate 6 adds the first exact pinned reducer and concrete read models. The function is not deployed remotely before PR review and protected CI completion. The next gate is the first vertical Engine runtime and read-model slice.
'''
          gate6 = '''
          Gate 6 implementation is complete locally under accepted `ADR-015`:

          - `day1_complete_task_v1` is the first pure executable TypeScript Engine reducer;
          - `complete_task` produces canonical `task.completed` or `task.completed_late` events;
          - Participant and Product Captain ownership is resolved from authoritative `TodayView`; Product Captain is not a membership/JWT role;
          - Captain without an explicit Participant assignment target receives deterministic `task_target_ambiguous_for_captain`;
          - accepted commands atomically update both `today_view:<participant_key>` and `captain_day_view` documents;
          - every prepared event and projection is schema-validated before `private.process_command(jsonb)`;
          - `api.get_today_view(...)`, `api.get_captain_day_view(...)` and `api.get_command_receipt(...)` provide authenticated, isolated browser read transport;
          - exact replay creates no duplicate receipt, event or projection version;
          - protected diagnostics passed 36 Deno unit tests, 246 pgTAP assertions and two direct PostgreSQL integration tests.

          This implementation change deliberately keeps the production runtime registry empty. After the pure reducer source is merged to protected `main`, a separate registration PR will pin that merge SHA in `ilka.runtime_releases` and wire the exact bundle without changing reducer behavior. The read-model migration and runtime release are not applied remotely from this feature branch, no cloud fixture data is created, and the Edge Function deployment remains blocked by the missing `SUPABASE_ACCESS_TOKEN` GitHub secret.
'''
          if 'Gate 6 implementation is complete locally under accepted `ADR-015`' not in text:
              if marker not in text:
                  raise SystemExit('README Gate 5 marker not found')
              text = text.replace(marker, marker + gate6, 1)
          text = text.replace(
              'deno fmt --check --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway',
              'deno fmt --check --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime',
          )
          text = text.replace(
              'deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway',
              'deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime',
          )
          if 'python scripts/validate_supabase_day1_vertical.py' not in text:
              text = text.replace(
                  'python scripts/validate_supabase_command_gateway.py\nsupabase stop',
                  'python scripts/validate_supabase_command_gateway.py\npython scripts/validate_supabase_day1_vertical.py\nsupabase stop',
                  1,
              )
          readme.write_text(text, encoding='utf-8')

          supabase_readme = Path('supabase/README.md')
          text = supabase_readme.read_text(encoding='utf-8')
          marker = '''It does **not** contain concrete Participant/Captain read documents, public API read functions, a frontend network adapter, scheduler jobs or Storage buckets.
'''
          replacement = '''Gate 6 adds the first executable Day 1 vertical:

          - accepted `ADR-015` for the `complete_task` reducer and authoritative read transport;
          - pure `day1_complete_task_v1` runtime producing `task.completed` or `task.completed_late`;
          - Product Captain resolution from the authoritative Day role assignment;
          - complete `TodayView` and `CaptainDayView` projection upserts in one atomic transaction;
          - projection JSON Schema validation in the gateway before persistence;
          - authenticated `api.get_today_view(...)`, Captain-only `api.get_captain_day_view(...)` and actor-owned `api.get_command_receipt(...)`;
          - 36 Deno unit tests, 246 pgTAP assertions and two direct PostgreSQL integration tests.

          The implementation PR intentionally keeps the production runtime registry empty until the protected reducer merge SHA exists. It does **not** include Expedition bootstrap, invitation acceptance, rotation, Day start, initial projection generation, additional reducers, frontend adapters, scheduler jobs, Realtime or Storage.
'''
          if 'Gate 6 adds the first executable Day 1 vertical:' not in text:
              if marker not in text:
                  raise SystemExit('Supabase README Gate 5 marker not found')
              text = text.replace(marker, replacement, 1)
          text = text.replace(
              'deno fmt --check --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway',
              'deno fmt --check --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime',
          )
          text = text.replace(
              'deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway',
              'deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime',
          )
          if 'python scripts/validate_supabase_day1_vertical.py' not in text:
              text = text.replace(
                  'python scripts/validate_supabase_command_gateway.py\n```',
                  'python scripts/validate_supabase_command_gateway.py\npython scripts/validate_supabase_day1_vertical.py\n```',
                  1,
              )
          text = text.replace(
              'Concrete read-model semantics remain owned by `app/contracts/*.schema.json` and the later Read Models gate.',
              'Concrete read-model semantics remain owned by `app/contracts/*.schema.json`; Gate 6 now exposes the first schema-valid TodayView and CaptainDayView read transport.',
          )
          text = text.replace(
              '`command-gateway` is not deployed remotely until its implementation PR and protected CI are green.',
              '`command-gateway` is not deployed remotely because the required `SUPABASE_ACCESS_TOKEN` GitHub secret is not configured. The Gate 6 read-model migration and runtime release are also not deployed from the implementation feature branch.',
          )
          supabase_readme.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          heading = '## 2026-07-20 — Day 1 complete_task vertical\n'
          section = '''## 2026-07-20 — Day 1 `complete_task` vertical

          - Accepted `ADR-015` for the first executable Day 1 reducer and authoritative read-model transport.
          - Added pure TypeScript runtime `day1_complete_task_v1` implementing only canonical `complete_task`.
          - Added deterministic `task.completed` and `task.completed_late` event generation with offline `occurred_at` and server `recorded_at` semantics.
          - Added assignment ownership, active Expedition/Day, terminal-task and Captain ambiguity guards.
          - Preserved Product Captain as an authoritative Day role assignment derived from `TodayView`, never membership or JWT metadata.
          - Added complete atomic upserts for Participant `TodayView` and `CaptainDayView` with one projection-version increment.
          - Added gateway validation for canonical Participant/Captain projection schemas before persistence.
          - Added authenticated `api.get_today_view(...)`, Captain-only `api.get_captain_day_view(...)` and actor-owned `api.get_command_receipt(...)`.
          - Preserved browser denial of raw identity, history and projection tables and prevented command-receipt enumeration.
          - Added 12 new reducer/projection unit scenarios within a 36-test Deno suite, 25 new pgTAP assertions for a total of 246, and a full gateway-to-PostgreSQL vertical integration test alongside the existing adapter integration.
          - Added generated database types and a protected Gate 6 static contract validator.

          The implementation PR intentionally keeps the production runtime registry empty until its protected merge SHA can be pinned in an immutable `runtime_releases` row. No remote migration, runtime release, Auth user, Expedition, command, event or projection is created from this feature branch. Expedition bootstrap, invitations, rotation, Day start, initial projection generation, additional command reducers and frontend Supabase adapters remain outside this gate.

          '''
          if heading not in text:
              text = text.replace('# Changelog\n\n', '# Changelog\n\n' + section, 1)
          changelog.write_text(text, encoding='utf-8')
          PY

      - name: Commit status documents
        run: |
          git add README.md supabase/README.md CHANGELOG.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(gate6): record Day 1 complete_task implementation"
          git push origin HEAD:feat/day1-complete-task-read-models
