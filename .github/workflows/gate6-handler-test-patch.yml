name: Gate 6 projection test patch

on:
  pull_request:
    paths:
      - "supabase/functions/command-gateway/tests/unit/handler.test.ts"
      - ".github/workflows/gate6-handler-test-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 6 branch
        uses: actions/checkout@v4
        with:
          ref: feat/day1-complete-task-read-models

      - name: Patch invalid projection fixture
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('supabase/functions/command-gateway/tests/unit/handler.test.ts')
          text = path.read_text(encoding='utf-8')
          start = text.index('Deno.test("invalid prepared projection is never sent to persistence"')
          end = text.index('Deno.test("stream conflict maps to HTTP 409"', start)
          replacement = '''Deno.test("invalid prepared projection is never sent to persistence", async () => {
            let persistenceCalled = false;
            const invalidProjectionRuntime = runtime({
              reduce: async (input) => ({
                status: "accepted",
                events: [{
                  event_id: "evt_gateway_projection_invalid_01",
                  event_type: "task.completed",
                  occurred_at: input.received_at,
                  recorded_at: input.received_at,
                  actor_id: input.actor_id,
                  actor_role: input.actor_role,
                  expedition_id: input.context.expedition_key,
                  command_id: input.command.command_id,
                  idempotency_key: input.command.command_id,
                  schema_version: 1,
                  payload: input.command.payload,
                }],
                projection_mutations: [{
                  operation: "upsert",
                  projection_key: "today_view:participant_01",
                  projection_type: "today_view",
                  subject_id: "participant_01",
                  schema_id: "https://ilka.local/schemas/today-view.schema.json",
                  schema_version: "1",
                  projection: { invalid: true },
                }],
                rejection: null,
              }),
            });
            const handler = createCommandGatewayHandler(dependencies({
              runtimes: new StaticRuntimeRegistry([invalidProjectionRuntime]),
              schemas: validators({
                validateProjection: () => [{ path: "/tasks", message: "invalid" }],
              }),
              database: database({
                processCommand: async () => {
                  persistenceCalled = true;
                  return result();
                },
              }),
            }));
            const response = await handler(post(command()));
            assertEquals(response.status, 500);
            assertEquals(persistenceCalled, false);
            const body = await json(response);
            assertEquals(
              (body.error as Record<string, unknown>).code,
              "runtime_contract_invalid",
            );
          });

          '''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format test
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/tests/unit/handler.test.ts

      - name: Commit patch
        run: |
          git add supabase/functions/command-gateway/tests/unit/handler.test.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test(gateway): exercise invalid prepared projection"
          git push origin HEAD:feat/day1-complete-task-read-models
