name: Gate 9C source synchronization

on:
  pull_request:

permissions:
  contents: write

jobs:
  synchronize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout Gate 9C branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9c-deterministic-rotation
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Normalize source-sync markers
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/patch_gate9c_sources.py')
          text = path.read_text(encoding='utf-8')

          old_start = 'if "    rotationExecutor,\\n" not in index:'
          new_start = 'if "  rotationExecutor,\\n" not in index:'
          if old_start in text:
              end_marker = 'index_path.write_text(index, encoding="utf-8")'
              start = text.find(old_start)
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit('index marker end boundary missing')
              block = '''if "  rotationExecutor,\\n" not in index:
              index = replace_once(
                  index,
                  "  invitationExecutor,\\n"
                  ");\\n",
                  "  invitationExecutor,\\n"
                  "  rotationExecutor,\\n"
                  ");\\n",
                  "index handler arguments",
              )
          '''
              text = text[:start] + block + text[end:]
          elif new_start not in text:
              raise SystemExit('normalized index marker missing')

          old_adr_marker = 'marker = "## Implementation sequence\\n"'
          new_adr_marker = 'marker = "## Consequences\\n"'
          if old_adr_marker in text:
              text = text.replace(old_adr_marker, new_adr_marker, 1)
          elif new_adr_marker not in text:
              raise SystemExit('ADR-018 insertion marker missing')

          path.write_text(text, encoding='utf-8')

      - name: Apply canonical source synchronization
        run: python scripts/patch_gate9c_sources.py

      - name: Generate command gateway contract
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format Gate 9C TypeScript
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway supabase/functions/_shared/engine-runtime

      - name: Commit synchronized sources before diagnostics
        shell: bash
        run: |
          rm -f gate9c-source-sync-error.txt gate9c-typecheck-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(gate9c): synchronize deterministic rotation sources"
          git push origin HEAD:feat/gate-9c-deterministic-rotation

      - name: Typecheck Gate 9C runtime and gateway
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          deno check \
            --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/index.ts \
            supabase/functions/command-gateway/tests/unit/rotation-*.test.ts \
            supabase/functions/command-gateway/tests/integration/rotation-execution.test.ts \
            supabase/functions/_shared/engine-runtime/expedition-rotation-v1.ts \
            > gate9c-typecheck-error.txt 2>&1

      - name: Upload typecheck diagnostic
        if: steps.typecheck.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: gate9c-typecheck-error
          path: gate9c-typecheck-error.txt
          if-no-files-found: error

      - name: Stop on typecheck failure
        if: steps.typecheck.outcome != 'success'
        run: |
          tail -n 200 gate9c-typecheck-error.txt
          exit 1

      - name: Run Gate 9C unit tests
        run: deno test --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/tests/unit/rotation-*.test.ts

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start and rebuild local Supabase
        run: |
          supabase start
          supabase db reset

      - name: Generate database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Run database tests
        run: supabase test db

      - name: Run Gate 9C PostgreSQL integration
        shell: bash
        run: |
          db_url="$(supabase status -o json | jq -r '.DB_URL')"
          SUPABASE_DB_URL="$db_url" deno test --frozen \
            --config supabase/functions/command-gateway/deno.json \
            --allow-env=SUPABASE_DB_URL \
            --allow-net=127.0.0.1:54322 \
            supabase/functions/command-gateway/tests/integration/rotation-execution.test.ts

      - name: Validate Gate 9C contract
        run: python scripts/validate_expedition_rotation.py

      - name: Commit generated database types
        shell: bash
        run: |
          rm -f gate9c-typecheck-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/database.types.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore(gate9c): refresh generated database types"
            git push origin HEAD:feat/gate-9c-deterministic-rotation
          fi

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
