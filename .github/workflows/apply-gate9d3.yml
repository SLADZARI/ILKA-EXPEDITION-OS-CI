name: Apply Gate 9D3 implementation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-implementation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Gate 9D3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate9d3-day1-boundary
          fetch-depth: 0

      - name: Reassemble and verify package
        shell: bash
        run: |
          cat > /tmp/gate9d3-chunks.sha256 <<'EOF'
          9adf765b72e03711bdceed896a0d002e9cce4c698f1f73deba873ceae710e5c8  .gate9d3/chunk-00.b64
          0c1bec847c33fcbf7e8dc2a5d4e3fc20646043bfe3134c76ac7a14c6a685d886  .gate9d3/chunk-01.b64
          4cd5f527f5b2bff795de170333634ee3ecb6b01ab4d8651edf410c4af68f0af9  .gate9d3/chunk-02.b64
          b7f595f49927b350e2f48820a5ddeca283621b3a1e14257318f6ffd246228cbb  .gate9d3/chunk-03.b64
          6f447ed7f56f794e3c784a622ab2da8fae0afd8180650061cc6c845b5cf09c0c  .gate9d3/chunk-04.b64
          3e17b20b203c216909aba386e494c3f7f7f70e17c3b93da1ade5d20a1b245797  .gate9d3/chunk-05.b64
          9d4e1b5ef1ff69ed30228c6b336ecea7ea548a04073c25ef3e62512562820476  .gate9d3/chunk-06.b64
          9a49f7a10f04372458bbe115d5814efa6bf51473acbcba6997a78dce657f45e1  .gate9d3/chunk-07.b64
          EOF
          sha256sum --check --strict /tmp/gate9d3-chunks.sha256
          cat .gate9d3/chunk-*.b64 | base64 --decode > /tmp/gate9d3-changes.tar.gz
          echo "e6dd10f0187272e42ddf8ac46c2320f75880b9a3a01fe468fe37ef979e78a824  /tmp/gate9d3-changes.tar.gz" | sha256sum --check --strict
          tar -tzf /tmp/gate9d3-changes.tar.gz
          tar -xzf /tmp/gate9d3-changes.tar.gz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Generate command gateway contract
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format command gateway and Engine runtime
        run: |
          deno fmt --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway \
            supabase/functions/_shared/command-gateway \
            supabase/functions/_shared/engine-runtime

      - name: Validate Gate 9D3 contracts
        run: |
          python scripts/validate_expedition_day1_start_contract.py
          python scripts/validate_expedition_day1_boundary.py
          python scripts/validate_repository.py .
          pytest -q

      - name: Commit Gate 9D3 implementation
        id: publication
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git reset -- .gate9d3 .github/workflows/validate.yml .github/workflows/apply-gate9d3.yml .github/workflows/snapshot-gate9d3.yml .github/workflows/debug-gate9d3-chunks.yml
            git status --short
            git diff --cached --stat
            git commit -m "feat(gate9d3): execute trusted Day 1 boundary"
            git push origin HEAD:agent/gate9d3-day1-boundary
          } > /tmp/gate9d3-publication.log 2>&1
          status=$?
          printf 'exit_status=%s\n' "$status" >> /tmp/gate9d3-publication.log
          exit "$status"

      - name: Upload publication diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate9d3-publication-log
          path: /tmp/gate9d3-publication.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail on publication error
        if: steps.publication.outcome == 'failure'
        shell: bash
        run: |
          cat /tmp/gate9d3-publication.log
          exit 1
