name: Gate 9B2A contract builder

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-contract-metadata:
    if: github.head_ref == 'feat/gate-9b2a-invitation-transaction-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/gate-9b2a-invitation-transaction-contracts
          token: ${{ github.token }}

      - name: Apply Gate 9B2A metadata patch
        run: python scripts/apply_gate9b2a_metadata.py

      - name: Remove one-shot builder
        run: rm scripts/apply_gate9b2a_metadata.py .github/workflows/gate9b2a-builder.yml

      - name: Commit final Gate 9B2A contract tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(gate9b2a): finalize protected invitation contracts"
          git push origin HEAD:feat/gate-9b2a-invitation-transaction-contracts
