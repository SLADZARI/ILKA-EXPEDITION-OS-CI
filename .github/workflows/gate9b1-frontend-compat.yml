name: Gate 9B1 frontend compatibility builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.head_ref == 'feat/gate-9b1-canonical-setup-contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Apply frontend validator compatibility patch
        run: python scripts/apply_gate9b1_frontend_compat.py
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Generate frontend contracts
        working-directory: frontend
        run: npm run generate:contracts
      - name: Validate generated sources and capture output
        id: validate
        continue-on-error: true
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run validate:sources 2>&1 | tee gate9b1-frontend-validator.log
      - name: Upload frontend validator output
        if: steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gate9b1-frontend-validator-output
          path: frontend/gate9b1-frontend-validator.log
      - name: Stop after frontend validator diagnostic
        if: steps.validate.outcome == 'failure'
        run: exit 1
      - name: Remove one-shot frontend compatibility builder
        if: steps.validate.outcome == 'success'
        run: git rm scripts/apply_gate9b1_frontend_compat.py .github/workflows/gate9b1-frontend-compat.yml
      - name: Commit final frontend compatibility update
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(gate9b1): align frontend parity with setup contracts"
          git push origin HEAD:${{ github.head_ref }}
