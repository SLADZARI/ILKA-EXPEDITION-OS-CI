name: Gate 8C typecheck artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Capture Deno typecheck
        shell: bash
        run: |
          set +e
          deno check --frozen \
            --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/index.ts \
            supabase/functions/command-gateway/tests/unit/*.ts \
            supabase/functions/command-gateway/tests/integration/*.ts \
            supabase/functions/_shared/engine-runtime/*.ts \
            > gate8c-typecheck.txt 2>&1
          status=$?
          echo "exit_status=$status" >> gate8c-typecheck.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: gate8c-typecheck-output
          path: gate8c-typecheck.txt
          if-no-files-found: error
