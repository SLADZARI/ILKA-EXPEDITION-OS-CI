name: Gate 8C format artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format Gate 8C TypeScript
        run: |
          deno fmt --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway \
            supabase/functions/_shared/command-gateway \
            supabase/functions/_shared/engine-runtime
          git diff --binary > gate8c-format.patch
      - uses: actions/upload-artifact@v4
        with:
          name: gate8c-format-patch
          path: gate8c-format.patch
          if-no-files-found: error
