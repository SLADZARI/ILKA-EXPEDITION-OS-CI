name: Gate 9B1 ordered fixture builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.head_ref == 'feat/gate-9b1-canonical-setup-contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Apply ordered fixture patch
        run: python scripts/apply_gate9b1_fixture_order.py
      - name: Validate canonical repository and Gate 9B1
        run: |
          python scripts/validate_repository.py .
          python scripts/validate_expedition_setup_contract.py
          pytest -q
      - name: Remove one-shot fixture builder
        run: git rm scripts/apply_gate9b1_fixture_order.py .github/workflows/gate9b1-fixture-order.yml
      - name: Commit ordered fixture update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(gate9b1): keep rotation readiness fixtures ordered"
          git push origin HEAD:${{ github.head_ref }}
