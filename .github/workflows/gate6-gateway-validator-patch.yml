name: Gate 6 gateway validator patch

on:
  push:
    branches:
      - feat/day1-complete-task-read-models
    paths:
      - ".github/workflows/gate6-gateway-validator-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout Gate 6 branch
        uses: actions/checkout@v4
        with:
          ref: feat/day1-complete-task-read-models

      - name: Align inherited Gate 5 CI expectations
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/validate_supabase_command_gateway.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '"Check command gateway formatting",': '"Check command gateway and Engine runtime formatting",',
              '"Lint command gateway",': '"Lint command gateway and Engine runtime",',
              '"Typecheck command gateway",': '"Typecheck command gateway and Engine runtime",',
              '"Run command gateway unit tests",': '"Run command gateway and Engine runtime unit tests",',
          }
          for before, after in replacements.items():
              text = text.replace(before, after)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit validator alignment
        run: |
          git add scripts/validate_supabase_command_gateway.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test(gateway): accept expanded Engine runtime CI steps"
          git push origin HEAD:feat/day1-complete-task-read-models
