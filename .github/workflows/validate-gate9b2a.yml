name: Validate Gate 9B2A contracts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  invitation-transaction-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate Expedition invitation transaction contract
        run: python scripts/validate_expedition_invitation_transaction_contract.py
