name: Gate 8B database type sync

on:
  pull_request:
    paths:
      - ".github/workflows/gate8b-types-sync.yml"
      - "supabase/migrations/20260721103000_expedition_bootstrap_transaction.sql"
      - "supabase/database.types.ts"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Gate 8B branch
        uses: actions/checkout@v4
        with:
          ref: feat/expedition-bootstrap-transaction

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Generate canonical database types
        run: supabase gen types typescript --local --schema api,ilka,private > supabase/database.types.ts

      - name: Commit generated type parity
        run: |
          git add supabase/database.types.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(supabase): regenerate bootstrap database types"
          git push origin HEAD:feat/expedition-bootstrap-transaction

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup || true
