name: Command gateway diagnostics

on:
  pull_request:
  push:
    branches:
      - feat/supabase-command-gateway

permissions:
  contents: write

jobs:
  deno-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/supabase-command-gateway

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependency
        run: python -m pip install PyYAML

      - name: Generate command metadata
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Resolve dependencies and generate lockfile
        run: |
          deno cache --config supabase/functions/command-gateway/deno.json \
            supabase/functions/command-gateway/index.ts \
            supabase/functions/command-gateway/tests/unit/*.ts \
            supabase/functions/command-gateway/tests/integration/*.ts

      - name: Format command gateway
        run: deno fmt --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway

      - name: Commit deterministic generated files
        shell: bash
        run: |
          git add deno.lock supabase/functions/command-gateway supabase/functions/_shared/command-gateway
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(supabase): format and lock command gateway"
          git push origin HEAD:feat/supabase-command-gateway

      - name: Lint command gateway
        run: deno lint --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway supabase/functions/_shared/command-gateway

      - name: Typecheck command gateway
        run: deno check --frozen --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/index.ts supabase/functions/command-gateway/tests/unit/*.ts supabase/functions/command-gateway/tests/integration/*.ts

      - name: Run command gateway unit tests
        run: deno test --frozen --config supabase/functions/command-gateway/deno.json supabase/functions/command-gateway/tests/unit
