name: Command gateway diagnostics

on:
  pull_request:
  push:
    branches:
      - feat/supabase-command-gateway

permissions:
  contents: write

jobs:
  deno-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/supabase-command-gateway

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependency
        run: python -m pip install PyYAML

      - name: Generate command metadata
        run: python scripts/generate_supabase_command_gateway_contract.py

      - name: Normalize async test capture
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("supabase/functions/command-gateway/tests/unit/handler.test.ts")
          text = path.read_text(encoding="utf-8")
          before = '''Deno.test("accepted runtime result is sent to the atomic transaction", async () => {
            let captured: Record<string, unknown> | null = null;
            const handler = createCommandGatewayHandler(dependencies({
              database: database({
                processCommand: async (request) => {
                  captured = request;
                  return result();
                },
              }),
            }));
            const response = await handler(post(command()));
            assertEquals(response.status, 200);
            assertExists(captured);
            const persistedCommand = captured.command as Record<string, unknown>;
            assertEquals(persistedCommand.actor_id, "participant_01");
            assertEquals(persistedCommand.actor_role, "participant");
            assertEquals((captured.request_hash as string).length, 64);
          });'''
          after = '''Deno.test("accepted runtime result is sent to the atomic transaction", async () => {
            const capture: { value?: Record<string, unknown> } = {};
            const handler = createCommandGatewayHandler(dependencies({
              database: database({
                processCommand: async (request) => {
                  capture.value = request;
                  return result();
                },
              }),
            }));
            const response = await handler(post(command()));
            assertEquals(response.status, 200);
            assertExists(capture.value);
            const captured = capture.value;
            const persistedCommand = captured.command as Record<string, unknown>;
            assertEquals(persistedCommand.actor_id, "participant_01");
            assertEquals(persistedCommand.actor_role, "participant");
            assertEquals((captured.request_hash as string).length, 64);
          });'''
          if before in text:
              path.write_text(text.replace(before, after, 1), encoding="utf-8")
          elif "const capture: { value?: Record<string, unknown> } = {};" not in text:
              raise SystemExit("expected async capture block not found")
          PY

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Deno diagnostics
        id: diagnostics
        shell: bash
        run: |
          set +e
          status=0
          {
            echo '=== DENO VERSION ==='
            deno --version
            echo '=== CACHE / LOCK ==='
            deno cache --config supabase/functions/command-gateway/deno.json \
              supabase/functions/command-gateway/index.ts \
              supabase/functions/command-gateway/tests/unit/*.ts \
              supabase/functions/command-gateway/tests/integration/*.ts
            cache_status=$?
            if [[ $cache_status -ne 0 ]]; then status=$cache_status; fi

            echo '=== FORMAT ==='
            deno fmt --config supabase/functions/command-gateway/deno.json \
              supabase/functions/command-gateway \
              supabase/functions/_shared/command-gateway
            fmt_status=$?
            if [[ $status -eq 0 && $fmt_status -ne 0 ]]; then status=$fmt_status; fi

            echo '=== LINT ==='
            deno lint --config supabase/functions/command-gateway/deno.json \
              supabase/functions/command-gateway \
              supabase/functions/_shared/command-gateway
            lint_status=$?
            if [[ $status -eq 0 && $lint_status -ne 0 ]]; then status=$lint_status; fi

            echo '=== CHECK ==='
            deno check --config supabase/functions/command-gateway/deno.json \
              supabase/functions/command-gateway/index.ts \
              supabase/functions/command-gateway/tests/unit/*.ts \
              supabase/functions/command-gateway/tests/integration/*.ts
            check_status=$?
            if [[ $status -eq 0 && $check_status -ne 0 ]]; then status=$check_status; fi

            echo '=== UNIT TESTS ==='
            deno test --config supabase/functions/command-gateway/deno.json \
              supabase/functions/command-gateway/tests/unit
            test_status=$?
            if [[ $status -eq 0 && $test_status -ne 0 ]]; then status=$test_status; fi
          } > /tmp/command-gateway-diagnostics.log 2>&1
          cat /tmp/command-gateway-diagnostics.log
          exit $status

      - name: Commit deterministic generated files
        if: success()
        shell: bash
        run: |
          git add deno.lock supabase/functions/command-gateway supabase/functions/_shared/command-gateway
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(supabase): format and lock command gateway"
          git push origin HEAD:feat/supabase-command-gateway

      - name: Upload Deno diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: command-gateway-diagnostics
          path: |
            /tmp/command-gateway-diagnostics.log
            deno.lock
          if-no-files-found: warn
          retention-days: 1
